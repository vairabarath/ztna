services:
  postgres:
    image: postgres:16-alpine
    container_name: ztna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ztna
    ports:
      # Controller connects locally on the host; keep Postgres off the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - ztna_postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ztna"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  ztna_postgres_data:
