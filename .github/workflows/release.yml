name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  BUF_VERSION: "1.50.0"

jobs:
  # Generate proto files first (needed by all builds)
  generate-proto:
    name: Generate Proto Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Buf
        run: |
          curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-$(uname -s)-$(uname -m)" -o "${TMPDIR}/buf"
          chmod +x "${TMPDIR}/buf"
          sudo mv "${TMPDIR}/buf" /usr/local/bin/buf
          buf --version

      - name: Generate Go Proto Files
        run: buf generate

      - name: Upload Proto Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proto-gen
          path: proto/gen/

  # Controller builds (Go supports easy cross-compilation)
  build-controller-linux:
    name: Build Controller (Linux)
    needs: generate-proto
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Proto Artifacts
        uses: actions/download-artifact@v4
        with:
          name: proto-gen
          path: proto/gen/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: controller/go.sum

      - name: Build Controller
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          cd controller
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../dist/ztna-controller-${{ matrix.suffix }} ./cmd/controller

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: controller-${{ matrix.suffix }}
          path: dist/ztna-controller-${{ matrix.suffix }}

  build-controller-macos:
    name: Build Controller (macOS)
    needs: generate-proto
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Proto Artifacts
        uses: actions/download-artifact@v4
        with:
          name: proto-gen
          path: proto/gen/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: controller/go.sum

      - name: Build Controller
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          cd controller
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../dist/ztna-controller-${{ matrix.suffix }} ./cmd/controller

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: controller-${{ matrix.suffix }}
          path: dist/ztna-controller-${{ matrix.suffix }}

  # Connector builds (Rust - requires native compilation for macOS)
  build-connector-linux:
    name: Build Connector (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Connector
        working-directory: connector
        run: |
          mkdir -p ../dist
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          cp target/${{ matrix.target }}/release/ztna-connector ../dist/ztna-connector-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-${{ matrix.suffix }}
          path: dist/ztna-connector-${{ matrix.suffix }}

  build-connector-macos:
    name: Build Connector (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Connector
        working-directory: connector
        run: |
          mkdir -p ../dist
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ztna-connector ../dist/ztna-connector-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: connector-${{ matrix.suffix }}
          path: dist/ztna-connector-${{ matrix.suffix }}

  # Agent builds (Rust - requires native compilation for macOS)
  build-agent-linux:
    name: Build Agent (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Agent
        working-directory: agent
        run: |
          mkdir -p ../dist
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          cp target/${{ matrix.target }}/release/ztna-agent ../dist/ztna-agent-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: dist/ztna-agent-${{ matrix.suffix }}

  build-agent-macos:
    name: Build Agent (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Agent
        working-directory: agent
        run: |
          mkdir -p ../dist
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ztna-agent ../dist/ztna-agent-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: dist/ztna-agent-${{ matrix.suffix }}

  create-release:
    name: Create Release
    needs: 
      - generate-proto
      - build-controller-linux
      - build-controller-macos
      - build-connector-linux
      - build-connector-macos
      - build-agent-linux
      - build-agent-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Make Binaries Executable
        run: chmod +x dist/*

      - name: Create Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
